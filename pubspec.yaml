name: ffr_crypto
description: "A Flutter-first, Rust-powered native cryptography package supporting RSA, AES-GCM, ChaCha20-Poly1305, SHA-2/3, BLAKE3, KDFs (Argon2), Ed25519, X25519, and ECIES."
version: 0.0.1
homepage: https://github.com/landxcape/ffr_crypto
repository: https://github.com/landxcape/ffr_crypto

environment:
  sdk: ^3.12.2

dependencies:
  code_assets: ^1.2.1
  ffi: ^2.1.4
  hooks: ^2.0.2
  logging: ^1.3.0
  native_toolchain_c: ^0.19.1

dev_dependencies:
  ffigen: ^20.1.1
  flutter_lints: ^6.0.0
  test: ^1.28.0
